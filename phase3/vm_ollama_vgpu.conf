[Service]
# Wrapper must live under /usr/local/bin so User=ollama can execute it
# (not under /home/test-4/... — permission denied for ollama user).
ExecStart=
ExecStart=/usr/local/bin/ollama_vgpu_wrapper.sh
Environment="OLLAMA_LLM_LIBRARY=cuda_v12"
Environment="OLLAMA_NUM_GPU=1"
# Cap default context: Ollama picks 256k ctx on large reported VRAM, which blows vGPU remoting (OOM on first alloc).
Environment="OLLAMA_CONTEXT_LENGTH=2048"
Environment="OLLAMA_DEBUG=1"
# Long-run verification (Phase 1): docs show ~0.92 load after ~150+ min (see FATBIN_TRACE_RECORD.md).
# Align server + transport with 4h wall clock; client must use curl -m >= same order.
Environment="OLLAMA_LOAD_TIMEOUT=4h"
# Mediated CUDA RPC stall budget (seconds); must cover worst-case HtoD + module phases
Environment="CUDA_TRANSPORT_TIMEOUT_SEC=14400"
Environment="GGML_CUDA_DISABLE_GRAPHS=1"
Environment="GGML_CUDA_DISABLE_GRAPH_RESERVE=1"
Environment="GGML_CUDA_DISABLE_BATCHED_CUBLAS=1"
Environment="OLLAMA_LIBRARY_PATH=/usr/local/lib/ollama/cuda_v12:/usr/local/lib/ollama"
Environment="LD_LIBRARY_PATH=/opt/vgpu/lib:/usr/local/lib/ollama/cuda_v12:/usr/local/lib/ollama:/usr/lib64"
# Required for the intended shmem transport path: mlock the region, resolve GPA
# via /proc/self/pagemap, and access the vGPU PCI device from the service sandbox.
LimitMEMLOCK=infinity
CapabilityBoundingSet=CAP_SYS_ADMIN CAP_IPC_LOCK
AmbientCapabilities=CAP_SYS_ADMIN CAP_IPC_LOCK
NoNewPrivileges=no
ProtectKernelTunables=no
PrivateDevices=no
ReadWritePaths=/sys/bus/pci/devices/
# Systemd must not kill the unit while a long load or slow stop is in progress
TimeoutStartSec=300s
TimeoutStopSec=300s
