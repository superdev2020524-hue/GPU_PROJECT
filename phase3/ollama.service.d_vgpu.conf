[Service]
ExecStart=
ExecStart=/usr/local/bin/ollama serve
# Keep high-volume shim diagnostics out of journald hot path.
StandardError=append:/var/log/ollama-stderr.log
# No LD_PRELOAD: with only LD_LIBRARY_PATH the runner's dlopen loads libggml-cuda and shims, so discovery and inference see GPU.
Environment=LD_LIBRARY_PATH=/opt/vgpu/lib:/usr/local/lib/ollama/cuda_v12:/usr/local/lib/ollama
Environment=OLLAMA_NUM_GPU=1
Environment=OLLAMA_LLM_LIBRARY=cuda_v12
Environment=OLLAMA_LIBRARY_PATH=/opt/vgpu/lib:/usr/local/lib/ollama/cuda_v12:/usr/local/lib/ollama
Environment=OLLAMA_LOAD_TIMEOUT=4h
Environment=OLLAMA_FLASH_ATTENTION=0
Environment=CUDA_TRANSPORT_TIMEOUT_SEC=14400
Environment=VGPU_SHMEM_MIN_SPAN_KB=64
Environment=GGML_CUDA_DISABLE_GRAPHS=1
Environment=GGML_CUDA_DISABLE_GRAPH_RESERVE=1
Environment=GGML_CUDA_DISABLE_BATCHED_CUBLAS=1
# Force-disable legacy bulk trace even if an old drop-in sets it.
Environment=VGPU_GUEST_BULK_TRACE=
# Guest-side bulk trace: /var/tmp/vgpu_bulk_guest.log + stderr (remove after debugging)
# Environment=VGPU_GUEST_BULK_TRACE=1
# BAR1 for large bulk when shmem is broken: HtoD only, module only, or both:
# Environment=VGPU_HTOD_BAR1=1
# Environment=VGPU_MODULE_BAR1=1
# Environment=VGPU_BULK_BAR1=1
# A/B (2026-03): VGPU_DISABLE_SHMEM=1 forces BAR1-only; mediator still had all-zero
# prefixes — not shmem-GPA-specific; investigate BAR1 MMIO vs stub bar1_data + doorbell order.
# Environment=VGPU_DISABLE_SHMEM=1
LimitMEMLOCK=infinity
CapabilityBoundingSet=CAP_SYS_ADMIN CAP_IPC_LOCK
AmbientCapabilities=CAP_SYS_ADMIN CAP_IPC_LOCK
NoNewPrivileges=no
ProtectKernelTunables=no
PrivateDevices=no
ReadWritePaths=/sys/bus/pci/devices/
