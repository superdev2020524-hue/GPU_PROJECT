[Service]
ExecStart=
ExecStart=/usr/local/bin/ollama.bin serve
# Optional: GOTRACEBACK=all helps Go panics reach the journal; E3 SIGFPE after native CUDA may still omit goroutine dumps
# (see CRASH_SYMBOLICATION_AND_COREDUMPS.md §2.1).
# Environment=GOTRACEBACK=all
# No LD_PRELOAD: with only LD_LIBRARY_PATH the runner's dlopen loads libggml-cuda and shims, so discovery and inference see GPU.
Environment=LD_LIBRARY_PATH=/opt/vgpu/lib:/usr/local/lib/ollama/cuda_v12:/usr/local/lib/ollama
Environment=OLLAMA_NUM_GPU=1
Environment=OLLAMA_LLM_LIBRARY=cuda_v12
Environment=OLLAMA_LIBRARY_PATH=/opt/vgpu/lib:/usr/local/lib/ollama/cuda_v12:/usr/local/lib/ollama
Environment=OLLAMA_LOAD_TIMEOUT=4h
Environment=CUDA_TRANSPORT_TIMEOUT_SEC=14400
Environment=GGML_CUDA_DISABLE_GRAPHS=1
Environment=GGML_CUDA_DISABLE_GRAPH_RESERVE=1
Environment=GGML_CUDA_DISABLE_BATCHED_CUBLAS=1
# Hopper + Q4: MMQ tile selection can abort (mmq.cuh fatal / mmq_x_best=0); force cuBLAS matmul path.
# GGML checks this at runtime; use "yes" (some builds ignore "1").
Environment=GGML_CUDA_FORCE_CUBLAS=yes
LimitMEMLOCK=infinity
CapabilityBoundingSet=CAP_SYS_ADMIN CAP_IPC_LOCK
AmbientCapabilities=CAP_SYS_ADMIN CAP_IPC_LOCK
NoNewPrivileges=no
ProtectKernelTunables=no
PrivateDevices=no
ReadWritePaths=/sys/bus/pci/devices/
